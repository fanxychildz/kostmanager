name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Web Project
        run: pnpm run build
        env:
          DATABASE_URL: libsql://dummy-database.turso.io
          DATABASE_AUTH_TOKEN: dummy-token

      - name: Create Dummy Web Dir
        run: mkdir -p dist/client

      - name: Capacitor Sync
        run: pnpm cap sync

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Commit and Push APK to public folder
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk public/KeKost.apk
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/KeKost.apk
          git commit -m "chore(mobile): update compiled KeKost.apk binary [skip ci]" || echo "No changes to commit"
          git push origin main
